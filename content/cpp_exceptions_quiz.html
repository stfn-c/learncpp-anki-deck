<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Exceptions Quiz</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .subtitle {
            color: #8b949e;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #161b22;
            border-radius: 6px;
            margin-bottom: 2rem;
            border: 1px solid #30363d;
        }

        .score { color: #58a6ff; font-weight: bold; }
        .progress { color: #8b949e; }

        .question-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .question-card.answered-correct {
            border-color: #238636;
        }

        .question-card.answered-wrong {
            border-color: #da3633;
        }

        .question-header {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .question-num {
            background: #30363d;
            color: #8b949e;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            height: fit-content;
        }

        .question-num.math {
            background: #1f3a5f;
            color: #58a6ff;
        }

        .question-text {
            color: #e6edf3;
            font-weight: 500;
        }

        pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            font-size: 0.85rem;
        }

        code {
            color: #79c0ff;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .option:hover:not(.disabled) {
            border-color: #58a6ff;
            background: #1f2937;
        }

        .option.disabled {
            cursor: default;
        }

        .option.selected {
            border-color: #58a6ff;
            background: #1f3a5f;
        }

        .option.correct {
            border-color: #238636;
            background: #122117;
        }

        .option.wrong {
            border-color: #da3633;
            background: #2d1214;
        }

        .option-letter {
            background: #30363d;
            color: #8b949e;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .option.correct .option-letter {
            background: #238636;
            color: #fff;
        }

        .option.wrong .option-letter {
            background: #da3633;
            color: #fff;
        }

        .option-text {
            flex: 1;
        }

        .explanation {
            margin-top: 1rem;
            padding: 1rem;
            background: #1c2128;
            border-left: 3px solid #58a6ff;
            border-radius: 0 6px 6px 0;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation-title {
            color: #58a6ff;
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .explanation-text {
            color: #8b949e;
            font-size: 0.9rem;
        }

        .btn-reset {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
            margin-top: 1rem;
        }

        .btn-reset:hover {
            background: #30363d;
        }

        .section-title {
            color: #8b949e;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #30363d;
        }

        .inline-code {
            background: #2d333b;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <h1>C++ Exceptions</h1>
    <p class="subtitle">Tough conceptual questions + code tracing</p>

    <div class="score-bar">
        <span class="score">Score: <span id="score">0</span>/<span id="total">15</span></span>
        <span class="progress"><span id="answered">0</span> answered</span>
        <button class="btn-reset" onclick="resetQuiz()">Reset</button>
    </div>

    <div class="section-title">Conceptual Questions</div>

    <div id="questions"></div>

    <script>
        const questions = [
            // CONCEPTUAL QUESTIONS
            {
                type: 'concept',
                question: 'Why are destructors implicitly <code class="inline-code">noexcept</code> in C++11 and later?',
                options: [
                    'To improve performance by avoiding exception handling overhead',
                    'Because throwing during stack unwinding calls std::terminate()',
                    'Destructors cannot contain code that might throw',
                    'The standard requires all special member functions to be noexcept'
                ],
                correct: 1,
                explanation: 'If a destructor throws while the stack is already unwinding from another exception, C++ has no way to handle two exceptions simultaneously — it calls <code>std::terminate()</code>. Making destructors implicitly noexcept prevents accidental program termination. Destructors CAN contain throwing code, but if it escapes, the program dies.'
            },
            {
                type: 'concept',
                question: 'What is the primary advantage of "zero-cost exceptions" in modern C++ implementations?',
                options: [
                    'Exceptions never have any runtime cost',
                    'The happy path (no throw) has zero overhead; cost is paid only when throwing',
                    'Exception objects are allocated on the stack instead of the heap',
                    'The compiler eliminates all exception handling code in release builds'
                ],
                correct: 1,
                explanation: 'Zero-cost exceptions use table-based unwinding. The happy path has literally zero instructions added. When an exception IS thrown, the runtime consults tables to find handlers and unwind — this is expensive, but rare. The term "zero-cost" refers only to the non-throwing path.'
            },
            {
                type: 'concept',
                question: 'Which exception safety guarantee does <code class="inline-code">std::vector::push_back()</code> provide when the element\'s copy constructor can throw?',
                options: [
                    'No guarantee — the vector may be corrupted',
                    'Basic guarantee — no leaks, but size may have changed',
                    'Strong guarantee — vector unchanged if copy throws',
                    'Nothrow guarantee — push_back never throws'
                ],
                correct: 2,
                explanation: '<code>push_back</code> provides the strong guarantee: if copying the new element throws, the vector is unchanged. It achieves this by copying to already-allocated space AFTER ensuring capacity. If reallocation is needed, elements are moved/copied to new storage before the old is released.'
            },
            {
                type: 'concept',
                question: 'What happens if you mark a function <code class="inline-code">noexcept</code> but it throws an exception anyway?',
                options: [
                    'The exception is silently ignored and the function returns normally',
                    'The exception is converted to std::exception',
                    'std::terminate() is called immediately (no stack unwinding)',
                    'Undefined behavior — anything can happen'
                ],
                correct: 2,
                explanation: 'Violating <code>noexcept</code> calls <code>std::terminate()</code> immediately. Notably, the stack is NOT unwound — destructors of local objects may not run. This is intentional: <code>noexcept</code> is a hard contract that enables optimizations. If you lie, you lose everything.'
            },
            {
                type: 'concept',
                question: 'Why does catching exceptions by <code class="inline-code">const reference</code> (e.g., <code class="inline-code">catch(const std::exception& e)</code>) matter?',
                options: [
                    'It\'s required by the standard — catching by value won\'t compile',
                    'It prevents object slicing and avoids unnecessary copies',
                    'It makes the exception object immutable for thread safety',
                    'It allows catching multiple exception types in one handler'
                ],
                correct: 1,
                explanation: 'Catching by value would SLICE a derived exception down to the base type, losing the actual error info. Catching by reference preserves polymorphism — <code>e.what()</code> calls the derived class\'s override. The <code>const</code> avoids accidental modification and allows binding to temporaries.'
            },
            {
                type: 'concept',
                question: 'In which order are catch blocks evaluated?',
                options: [
                    'Most derived type first, regardless of source order',
                    'Base types first to catch broader categories',
                    'In source order — first matching handler wins',
                    'The compiler optimizes the order based on likelihood'
                ],
                correct: 2,
                explanation: 'Catch blocks are tried in the exact order written. This is why you MUST put derived exception types before base types. <code>catch(std::exception&)</code> before <code>catch(std::runtime_error&)</code> means runtime_error is never caught specifically — the base handler grabs it first.'
            },
            {
                type: 'concept',
                question: 'What is the purpose of <code class="inline-code">throw;</code> (with no operand) inside a catch block?',
                options: [
                    'Throws a new default-constructed exception',
                    'Rethrows the currently caught exception, preserving its type',
                    'Throws std::current_exception()',
                    'Terminates the catch block without rethrowing'
                ],
                correct: 1,
                explanation: '<code>throw;</code> rethrows the ORIGINAL exception object with its original dynamic type intact. If you wrote <code>throw e;</code> instead, you\'d throw a COPY, potentially slicing a derived type. <code>throw;</code> is the correct way to "catch, log, rethrow."'
            },
            {
                type: 'concept',
                question: 'Which of these is NOT a valid reason to prefer exceptions over error codes?',
                options: [
                    'Exceptions cannot be silently ignored like return values',
                    'Exceptions separate error handling from the normal code path',
                    'Exceptions are faster than checking return values',
                    'Exceptions can propagate across functions that don\'t know about the error'
                ],
                correct: 2,
                explanation: 'Exceptions are NOT faster — in fact, throwing is quite expensive (table lookups, unwinding). Their advantage is in code structure, not performance. Error codes require manual propagation through every intermediate function; exceptions jump directly to handlers.'
            },
            {
                type: 'concept',
                question: 'What does RAII have to do with exception safety?',
                options: [
                    'RAII prevents exceptions from being thrown',
                    'RAII guarantees destructors run during stack unwinding, ensuring cleanup',
                    'RAII converts exceptions to error codes automatically',
                    'RAII is an alternative to exception handling'
                ],
                correct: 1,
                explanation: 'RAII is exception safety\'s best friend. When an exception causes stack unwinding, destructors of all local RAII objects run in reverse order. This means resources (memory, files, locks) are released automatically — no explicit cleanup code needed, no leaks possible.'
            },
            {
                type: 'concept',
                question: 'Why might you use <code class="inline-code">std::exception_ptr</code> and <code class="inline-code">std::rethrow_exception()</code>?',
                options: [
                    'To throw exceptions from constructors',
                    'To transport exceptions across threads or store them for later',
                    'To convert C-style errors to C++ exceptions',
                    'To implement custom exception hierarchies'
                ],
                correct: 1,
                explanation: '<code>std::exception_ptr</code> is a type-erased handle to an exception that can outlive the catch block. Use case: a worker thread catches an exception, stores it in <code>exception_ptr</code>, and the main thread later calls <code>rethrow_exception()</code> to handle it. Essential for <code>std::future</code> and parallel algorithms.'
            },

            // MATH-OUT / CODE TRACING QUESTIONS
            {
                type: 'math',
                question: 'What does this program output?',
                code: `#include <iostream>
struct A {
    A(int x) : id(x) { std::cout << "A" << id << " "; }
    ~A() { std::cout << "~A" << id << " "; }
    int id;
};

void bar() {
    A a3(3);
    throw std::runtime_error("oops");
    A a4(4);
}

void foo() {
    A a2(2);
    bar();
}

int main() {
    A a1(1);
    try {
        foo();
    } catch (...) {
        std::cout << "caught ";
    }
    std::cout << "end";
}`,
                options: [
                    'A1 A2 A3 ~A3 ~A2 caught end ~A1',
                    'A1 A2 A3 ~A3 ~A2 caught ~A1 end',
                    'A1 A2 A3 ~A3 ~A2 ~A1 caught end',
                    'A1 A2 A3 A4 ~A4 ~A3 ~A2 caught ~A1 end'
                ],
                correct: 0,
                explanation: 'Trace: A1 constructed → A2 constructed → A3 constructed → throw (A4 never constructed!) → stack unwinds: ~A3 → ~A2 → catch reached → "caught" printed → "end" printed → main exits → ~A1. Key insight: a1 is OUTSIDE the try block, so it\'s destroyed when main() exits, not during unwinding.'
            },
            {
                type: 'math',
                question: 'What does this program output?',
                code: `#include <iostream>
void inner() {
    try {
        throw 42;
    } catch (int x) {
        std::cout << x << " ";
        throw;  // rethrow
    }
}

int main() {
    try {
        inner();
    } catch (int x) {
        std::cout << x * 2;
    }
}`,
                options: [
                    '42 42',
                    '42 84',
                    '42',
                    'Undefined behavior'
                ],
                correct: 1,
                explanation: 'The value 42 is thrown → inner\'s catch prints "42 " → <code>throw;</code> rethrows the SAME exception (still 42) → main\'s catch receives it → prints 42*2 = 84. Note: <code>throw;</code> doesn\'t create a new exception; it propagates the original.'
            },
            {
                type: 'math',
                question: 'What does this program output?',
                code: `#include <iostream>
struct Base { virtual ~Base() = default; };
struct Derived : Base {};

int main() {
    try {
        throw Derived();
    } catch (Base b) {
        std::cout << "Base ";
    } catch (Derived d) {
        std::cout << "Derived ";
    }
    std::cout << "done";
}`,
                options: [
                    'Derived done',
                    'Base done',
                    'Base Derived done',
                    'Compile error: ambiguous catch'
                ],
                correct: 1,
                explanation: 'Catch blocks are matched in ORDER, and <code>catch(Base b)</code> matches <code>Derived</code> because Derived IS-A Base. The second catch is unreachable. Also note: catching by value <code>(Base b)</code> SLICES the object. This is a double mistake — wrong order AND slicing. Always catch by reference, most-derived first.'
            },
            {
                type: 'math',
                question: 'How many times is "~X" printed?',
                code: `#include <iostream>
struct X {
    X() { std::cout << "X "; }
    ~X() { std::cout << "~X "; }
};

void f() {
    X arr[3];
    throw 1;
}

int main() {
    try { f(); } catch (...) {}
}`,
                options: [
                    '0 times',
                    '1 time',
                    '3 times',
                    'Undefined — array might not be fully unwound'
                ],
                correct: 2,
                explanation: 'Output: "X X X ~X ~X ~X ". Three X objects are constructed (array of 3). When throw happens, stack unwinding destroys all 3 in reverse order. Arrays are unwound element-by-element — the exception mechanism tracks how many elements were successfully constructed.'
            },
            {
                type: 'math',
                question: 'What does this program output?',
                code: `#include <iostream>
int count = 0;

struct Counter {
    Counter() { ++count; if (count == 3) throw "third"; }
    ~Counter() { std::cout << count-- << " "; }
};

int main() {
    try {
        Counter arr[5];
    } catch (...) {
        std::cout << "caught";
    }
}`,
                options: [
                    '5 4 3 2 1 caught',
                    '2 1 caught',
                    'caught (no destructors run)',
                    '3 2 1 caught'
                ],
                correct: 1,
                explanation: 'Only 2 objects are fully constructed (count reaches 1, then 2). The 3rd constructor throws. Unwinding destroys the 2 completed objects in reverse: prints "2 " (count becomes 1), prints "1 " (count becomes 0), then "caught". The half-constructed 3rd object\'s destructor does NOT run.'
            }
        ];

        let answered = new Set();
        let score = 0;

        function renderQuestions() {
            const container = document.getElementById('questions');
            let conceptHtml = '';
            let mathHtml = '<div class="section-title">Code Tracing ("Math It Out")</div>';

            questions.forEach((q, i) => {
                const isMath = q.type === 'math';
                const html = `
                    <div class="question-card" id="q${i}">
                        <div class="question-header">
                            <span class="question-num ${isMath ? 'math' : ''}">${isMath ? 'TRACE' : 'Q'}${i + 1}</span>
                            <span class="question-text">${q.question}</span>
                        </div>
                        ${q.code ? `<pre><code>${escapeHtml(q.code)}</code></pre>` : ''}
                        <div class="options">
                            ${q.options.map((opt, j) => `
                                <div class="option" data-q="${i}" data-opt="${j}" onclick="selectOption(${i}, ${j})">
                                    <span class="option-letter">${String.fromCharCode(65 + j)}</span>
                                    <span class="option-text">${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="explanation" id="exp${i}">
                            <div class="explanation-title">Explanation</div>
                            <div class="explanation-text">${q.explanation}</div>
                        </div>
                    </div>
                `;

                if (isMath) {
                    mathHtml += html;
                } else {
                    conceptHtml += html;
                }
            });

            container.innerHTML = conceptHtml + mathHtml;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function selectOption(qIndex, optIndex) {
            if (answered.has(qIndex)) return;

            answered.add(qIndex);
            const q = questions[qIndex];
            const isCorrect = optIndex === q.correct;

            if (isCorrect) score++;

            // Update UI
            const card = document.getElementById(`q${qIndex}`);
            card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

            const options = card.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === q.correct) opt.classList.add('correct');
                if (i === optIndex && !isCorrect) opt.classList.add('wrong');
            });

            document.getElementById(`exp${qIndex}`).classList.add('show');
            document.getElementById('score').textContent = score;
            document.getElementById('answered').textContent = answered.size;
        }

        function resetQuiz() {
            answered = new Set();
            score = 0;
            document.getElementById('score').textContent = 0;
            document.getElementById('answered').textContent = 0;
            renderQuestions();
        }

        renderQuestions();
    </script>
</body>
</html>
